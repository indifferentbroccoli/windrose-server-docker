name: Release
on:
  release:
    types:
      - published
jobs:
  release:
    name: Release - Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Docker - Login
        uses: docker/login-action@v3
        with:
          username: '${{ secrets.DOCKER_USERNAME }}'
          password: '${{ secrets.DOCKER_PASSWORD }}'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker - Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
          flavor: latest=true
      - name: Docker - Build / Push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          platforms: 'linux/amd64,linux/arm64'
          push: true
          tags: '${{ steps.meta.outputs.tags }}'
  release-wine-staging:
    name: Release - Wine Staging Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Docker - Login
        uses: docker/login-action@v3
        with:
          username: '${{ secrets.DOCKER_USERNAME }}'
          password: '${{ secrets.DOCKER_PASSWORD }}'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker - Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}}-wine-staging
            type=semver,pattern=v{{major}}.{{minor}}-wine-staging
            type=semver,pattern=v{{major}}-wine-staging
            type=raw,value=wine-staging
          flavor: latest=false
      - name: Docker - Build / Push
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.staging
          platforms: 'linux/amd64,linux/arm64'
          push: true
          tags: '${{ steps.meta.outputs.tags }}'
